<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Tutor AI</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Reading Tutor AI</h1>
            <p class="subtitle">Practice reading with AI-powered feedback</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-group">
                    <label for="originalText">Original Text</label>
                    <textarea 
                        id="originalText" 
                        placeholder="Enter the text the child should read..."
                        rows="4"
                    ></textarea>
                </div>

                <div class="input-group">
                    <label for="spokenText">Text Spoken by Child</label>
                    <textarea 
                        id="spokenText" 
                        placeholder="Enter what the child actually said..."
                        rows="4"
                    ></textarea>
                </div>

                <button id="analyzeBtn" class="analyze-btn">
                    Analyze Reading
                </button>
            </div>

            <div id="results" class="results-section" style="display: none;">
                <h2>Analysis Results</h2>
                
                <div class="feedback-section">
                    <h3>Feedback</h3>
                    <p id="feedbackMessage" class="feedback-message"></p>
                </div>

                <div class="practice-section">
                    <h3>Words to Practice</h3>
                    <div id="practiceItems" class="practice-items"></div>
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing reading...</p>
            </div>

            <div id="error" class="error-section" style="display: none;">
                <p id="errorMessage"></p>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
